{% extends "base.html" %}
{% block title %}{{ action }} запись{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card card-soft">
            <div class="card-body">
                <h2 class="mb-4">{{ action }} запись</h2>
                <form method="post" action="{{ form_action }}">
                    <div class="mb-3">
                        <label class="form-label">IID</label>
                        <input class="form-control" name="iid" value="{{ row['iid'] if row else '' }}" {% if row %}readonly{% endif %} required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Phenotype</label>
                        <input class="form-control" name="phenotype" value="{{ row['phenotype'] if row else '' }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Sex</label>
                        <input class="form-control" name="sex" value="{{ row['sex'] if row else '' }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Age</label>
                        <input class="form-control" name="age" value="{{ row['age'] if row else '' }}" required>
                    </div>
                    <div class="d-flex gap-2">
                        <button class="btn btn-primary">Сохранить</button>
                        <a class="btn btn-outline-secondary" href="{{ url_for('metadata_list') }}">Назад</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
